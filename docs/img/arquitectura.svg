<svg width="860" height="600" viewBox="0 0 860 600" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="flecha" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#5f5e5a"/>
    </marker>
    <marker id="flecha-punteada" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#993556"/>
    </marker>
  </defs>

  <!-- Cliente -->
  <rect x="330" y="20" width="200" height="56" rx="8" fill="#f1efe8" stroke="#b4b2a9"/>
  <text x="430" y="44" font-size="14" font-weight="600" fill="#444441" text-anchor="middle">Cliente</text>
  <text x="430" y="64" font-size="12" fill="#5f5e5a" text-anchor="middle">un solo puerto: 8080</text>

  <line x1="430" y1="76" x2="430" y2="112" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#flecha)"/>

  <!-- Gateway -->
  <rect x="280" y="115" width="300" height="64" rx="8" fill="#e1f5ee" stroke="#0f6e56"/>
  <text x="430" y="141" font-size="14" font-weight="600" fill="#085041" text-anchor="middle">essenz_gateway (Nginx)</text>
  <text x="430" y="162" font-size="12" fill="#0f6e56" text-anchor="middle">enruta por path · DNS dinámico (127.0.0.11)</text>

  <!-- Red interna -->
  <rect x="20" y="210" width="820" height="370" rx="12" fill="#fafaf8" stroke="#d3d1c7"/>
  <text x="40" y="238" font-size="14" font-weight="600" fill="#444441">essenz_network — red interna de Docker</text>

  <!-- Flechas gateway -> servicios -->
  <path d="M 350 179 L 160 270" fill="none" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#flecha)"/>
  <text x="218" y="218" font-size="11" fill="#5f5e5a">/api/auth/</text>
  <line x1="430" y1="179" x2="430" y2="268" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#flecha)"/>
  <text x="438" y="218" font-size="11" fill="#5f5e5a">/api/notifications/</text>
  <path d="M 510 179 L 700 270" fill="none" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#flecha)"/>
  <text x="640" y="218" font-size="11" fill="#5f5e5a" text-anchor="end">/api/events/</text>

  <!-- Auth -->
  <rect x="50" y="272" width="220" height="76" rx="8" fill="#e1f5ee" stroke="#0f6e56"/>
  <text x="160" y="298" font-size="13" font-weight="600" fill="#085041" text-anchor="middle">essenz_auth</text>
  <text x="160" y="316" font-size="11" fill="#0f6e56" text-anchor="middle">alias: essenz-auth</text>
  <text x="160" y="333" font-size="11" fill="#0f6e56" text-anchor="middle">Django/DRF · JWT · dev :8000</text>

  <rect x="50" y="380" width="220" height="56" rx="8" fill="#e8f0fb" stroke="#2c5f9e"/>
  <text x="160" y="403" font-size="12" font-weight="600" fill="#1d4470" text-anchor="middle">auth_db (PostgreSQL 16)</text>
  <text x="160" y="421" font-size="11" fill="#2c5f9e" text-anchor="middle">dev :5432</text>
  <line x1="160" y1="348" x2="160" y2="378" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#flecha)"/>

  <!-- Notifications -->
  <rect x="320" y="272" width="220" height="76" rx="8" fill="#e1f5ee" stroke="#0f6e56"/>
  <text x="430" y="298" font-size="13" font-weight="600" fill="#085041" text-anchor="middle">essenz_notifications</text>
  <text x="430" y="316" font-size="11" fill="#0f6e56" text-anchor="middle">alias: essenz-notifications</text>
  <text x="430" y="333" font-size="11" fill="#0f6e56" text-anchor="middle">Django · canales · dev :8001</text>

  <rect x="320" y="380" width="105" height="56" rx="8" fill="#eeedfe" stroke="#534ab7"/>
  <text x="372" y="403" font-size="11" font-weight="600" fill="#3c3489" text-anchor="middle">notifications_</text>
  <text x="372" y="417" font-size="11" font-weight="600" fill="#3c3489" text-anchor="middle">redis :6379</text>

  <rect x="435" y="380" width="105" height="56" rx="8" fill="#e1f5ee" stroke="#0f6e56"/>
  <text x="487" y="403" font-size="11" font-weight="600" fill="#085041" text-anchor="middle">notifications_</text>
  <text x="487" y="417" font-size="11" font-weight="600" fill="#085041" text-anchor="middle">worker (Celery)</text>

  <line x1="372" y1="348" x2="372" y2="378" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#flecha)"/>
  <line x1="487" y1="378" x2="487" y2="348" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#flecha)"/>

  <rect x="320" y="464" width="220" height="56" rx="8" fill="#faeeda" stroke="#854f0b"/>
  <text x="430" y="487" font-size="12" font-weight="600" fill="#633806" text-anchor="middle">essenz_n8n (flujos)</text>
  <text x="430" y="505" font-size="11" fill="#854f0b" text-anchor="middle">dev :5678</text>
  <line x1="430" y1="436" x2="430" y2="462" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#flecha)"/>

  <!-- Events -->
  <rect x="590" y="272" width="220" height="76" rx="8" fill="#e1f5ee" stroke="#0f6e56"/>
  <text x="700" y="298" font-size="13" font-weight="600" fill="#085041" text-anchor="middle">essenz_events</text>
  <text x="700" y="316" font-size="11" fill="#0f6e56" text-anchor="middle">alias: essenz-events</text>
  <text x="700" y="333" font-size="11" fill="#0f6e56" text-anchor="middle">hub de eventos · dev :8002</text>

  <rect x="590" y="380" width="105" height="56" rx="8" fill="#eeedfe" stroke="#534ab7"/>
  <text x="642" y="403" font-size="11" font-weight="600" fill="#3c3489" text-anchor="middle">events_redis</text>
  <text x="642" y="417" font-size="11" font-weight="600" fill="#3c3489" text-anchor="middle">:6380</text>

  <rect x="705" y="380" width="105" height="56" rx="8" fill="#e1f5ee" stroke="#0f6e56"/>
  <text x="757" y="403" font-size="11" font-weight="600" fill="#085041" text-anchor="middle">events_worker</text>
  <text x="757" y="417" font-size="11" font-weight="600" fill="#085041" text-anchor="middle">(Celery)</text>

  <rect x="590" y="464" width="220" height="56" rx="8" fill="#e8f0fb" stroke="#2c5f9e"/>
  <text x="700" y="487" font-size="12" font-weight="600" fill="#1d4470" text-anchor="middle">events_db (PostgreSQL 16)</text>
  <text x="700" y="505" font-size="11" fill="#2c5f9e" text-anchor="middle">dev :5433 · tabla Event</text>

  <line x1="642" y1="348" x2="642" y2="378" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#flecha)"/>
  <line x1="757" y1="378" x2="757" y2="348" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#flecha)"/>
  <line x1="700" y1="436" x2="700" y2="462" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#flecha)"/>

  <!-- Integraciones Nivel 2 -->
  <path d="M 270 320 C 420 250, 560 250, 588 300" fill="none" stroke="#993556" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#flecha-punteada)"/>
  <text x="430" y="262" font-size="11" fill="#993556" text-anchor="middle">Nivel 2: auth publica user.registered</text>

  <path d="M 590 330 C 560 360, 560 360, 542 330" fill="none" stroke="#993556" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#flecha-punteada)"/>
  <text x="566" y="364" font-size="11" fill="#993556" text-anchor="middle">Nivel 2: webhook</text>

  <text x="40" y="560" font-size="11" fill="#5f5e5a">Los puertos "dev :xxxx" existen solo para desarrollo (admin, Swagger, inspección). El único puerto necesario es el 8080 del gateway.</text>
</svg>
