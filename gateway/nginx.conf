# =============================================================
# Essenz Master Orchestrator — API Gateway (Nginx)
#
# Punto de entrada ÚNICO del ecosistema (puerto 8080 del host).
# Enruta por path hacia cada microservicio a través de la red
# interna essenz_network, resolviendo por nombre de contenedor.
#
# Mapa de rutas (público -> interno):
#   /api/auth/...          -> essenz_auth:8000/api/v1/auth/...
#   /api/notifications/... -> essenz_notifications:8000/api/notifications/...
#   /api/events/...        -> essenz_events:8000/api/v1/events/...
#   /health/auth/          -> essenz_auth:8000/health/
#   /health/events/        -> essenz_events:8000/health/
#
# DNS dinámico: se usa el resolver embebido de Docker (127.0.0.11)
# con proxy_pass por variable. Así nginx re-resuelve los nombres en
# cada petición y un `docker compose up -d` que recree contenedores
# (IPs nuevas) NO deja al gateway apuntando a IPs viejas.
#
# El admin de Django y Swagger de cada servicio NO pasan por el
# gateway (usan rutas absolutas): se acceden por los puertos de
# desarrollo 8000/8001/8002 publicados en el compose maestro.
# =============================================================

server {
    listen 80;
    server_name _;

    # DNS embebido de Docker; TTL corto para reaccionar a recreaciones
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Destinos como variables: fuerza re-resolución por petición
    set $auth_backend          essenz_auth;
    set $notifications_backend essenz_notifications;
    set $events_backend        essenz_events;
    # Frontends (cada uno es un contenedor Nginx que sirve su build)
    set $portal_backend        essenz_portal;
    set $inshop_backend        essenz_inshop;

    # ----------------------------------------------------------
    # Cabeceras de proxy comunes: cada servicio sabe quién es el
    # cliente real y qué protocolo usó (necesario para CSRF/CORS
    # y para construir URLs absolutas correctas).
    # ----------------------------------------------------------
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Un backend caído debe fallar rápido, no colgar al cliente
    proxy_connect_timeout 5s;
    proxy_read_timeout    30s;

    # Los eventos llevan payload JSON; 1m es más que suficiente
    client_max_body_size 1m;

    # ----------------------------------------------------------
    # Essenz Auth — autenticación y usuarios
    # ----------------------------------------------------------
    location /api/auth/ {
        rewrite ^/api/auth/(.*)$ /api/v1/auth/$1 break;
        proxy_pass http://$auth_backend:8000;
    }

    # ----------------------------------------------------------
    # Essenz Notifications — despachador multicanal
    # ----------------------------------------------------------
    location /api/notifications/ {
        # El path interno coincide con el público: no hay rewrite
        proxy_pass http://$notifications_backend:8000;
    }

    # ----------------------------------------------------------
    # Essenz Events — hub de eventos de dominio
    # ----------------------------------------------------------
    location /api/events/ {
        rewrite ^/api/events/(.*)$ /api/v1/events/$1 break;
        proxy_pass http://$events_backend:8000;
    }

    # ----------------------------------------------------------
    # Healthchecks agregables por el orquestador / monitoreo
    # (notifications aún no expone /health/; se añadirá en Nivel 2)
    # ----------------------------------------------------------
    location /health/auth/ {
        rewrite ^.*$ /health/ break;
        proxy_pass http://$auth_backend:8000;
    }

    location /health/events/ {
        rewrite ^.*$ /health/ break;
        proxy_pass http://$events_backend:8000;
    }

    # ----------------------------------------------------------
    # FRONTENDS — apps estáticas (cada una su propio contenedor Nginx)
    # ----------------------------------------------------------

    # InShop — app de inventario (essenz.cl/InShop). El proxy_pass por
    # variable reenvía el URI original tal cual (/InShop/...).
    location /InShop/ {
        proxy_pass http://$inshop_backend:80;
    }
    location = /InShop {
        return 302 /InShop/;
    }

    # EssenzPlay — vive en su propio repo/stack. Cuando se integre al
    # compose maestro, descomenta y apunta a su contenedor.
    # location /essenzplay/ {
    #     proxy_pass http://essenz_essenzplay:80;
    # }

    # Mapa de rutas legible por máquinas (diagnóstico/monitoreo)
    location = /__routes {
        default_type application/json;
        return 200 '{"service":"essenz-gateway","frontends":{"portal":"/","inshop":"/InShop/"},"api":{"auth":"/api/auth/","notifications":"/api/notifications/","events":"/api/events/"}}';
    }

    # ----------------------------------------------------------
    # Portal Essenz Master — raíz del dominio (catch-all, al final).
    # Las rutas /api/* y /InShop/ son más específicas y tienen prioridad.
    # ----------------------------------------------------------
    location / {
        proxy_pass http://$portal_backend:80;
    }
}
